{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

      <div class="row">

            <!-- Articles Chart -->
            <div class="col-md-6">
                  <div class="card p-3 shadow-sm mb-4">
                        <h5 class="text-center">Articles Sentiment</h5>
                        <canvas id="articleChart"></canvas>
                  </div>
            </div>

            <!-- Comments Chart -->
            <div class="col-md-6">
                  <div class="card p-3 shadow-sm mb-4">
                        <h5 class="text-center">Comments Sentiment</h5>
                        <canvas id="commentChart"></canvas>
                  </div>
            </div>

      </div>

      <!-- ✅ Bar Chart -->
      <div class="card p-4 shadow-sm mt-4">
            <h5 class="text-center mb-3">Articles vs Comments Comparison</h5>
            <canvas id="comparisonChart"></canvas>
      </div>

</div>

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
      // Articles Pie Chart
      new Chart(document.getElementById('articleChart'), {
            type: 'pie',
            data: {
                  labels: ['Positive', 'Negative', 'Neutral'],
                  datasets: [{
                        data: [
                              {{ article_data.positive }},
                  {{ article_data.negative }},
                    {{ article_data.neutral }}
                ],
            backgroundColor: ['#198754', '#dc3545', '#ffc107']
            }]
        }
    });

      // Comments Pie Chart
      new Chart(document.getElementById('commentChart'), {
            type: 'pie',
            data: {
                  labels: ['Positive', 'Negative', 'Neutral'],
                  datasets: [{
                        data: [
                              {{ comment_data.positive }},
                  {{ comment_data.negative }},
                    {{ comment_data.neutral }}
                ],
            backgroundColor: ['#0d6efd', '#6610f2', '#6c757d']
            }]
        }
    });

      // ✅ Bar Chart (Comparison)
      new Chart(document.getElementById('comparisonChart'), {
            type: 'bar',
            data: {
                  labels: ['Positive', 'Negative', 'Neutral'],
                  datasets: [
                        {
                              label: 'Articles',
                              data: [
                                    {{ article_data.positive }},
                        {{ article_data.negative }},
                        {{ article_data.neutral }}
                    ],
            backgroundColor: '#198754'
                },
            {
                  label: 'Comments',
                  data: [
                        {{ comment_data.positive }},
            {{ comment_data.negative }},
            {{ comment_data.neutral }}
                    ],
            backgroundColor: '#0d6efd'
                }
            ]
        },
            options: {
            responsive: true,
            plugins: {
                  legend: {
                        position: 'top'
                  }
            }
      }
    });
</script>

{% endblock %}
